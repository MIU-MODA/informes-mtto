<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validación de Certificado - Schneider Ingenieros</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --verde:#7AB800;
  --verde-osc:#2D5A00;
  --verde-claro:#A6E000;
  --rojo:#c43030;
  --rojo-osc:#7a1a1a;
  --naranja:#e08020;
  --naranja-osc:#8a4a10;
  --negro:#1a1a1a;
  --gris-bg:#f4f6f8;
  --gris-med:#666;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Barlow',sans-serif;
  background:linear-gradient(135deg,#1a1a1a 0%,#2D5A00 100%);
  min-height:100vh;
  color:#1a1a2e;
  padding:20px 14px;
  display:flex;flex-direction:column;align-items:center;
}

/* Header con logo */
.brand-header{margin-bottom:18px;text-align:center;}
.brand-logo-img{
  height:60px;width:auto;
  background:white;
  padding:8px 16px;
  border-radius:4px;
  box-shadow:0 4px 14px rgba(0,0,0,0.3);
}
.brand-tagline{color:rgba(255,255,255,0.7);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:8px;font-weight:600;}

/* Card principal */
.card{
  background:white;
  width:100%;max-width:540px;
  border-radius:8px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.45);
  border-top:6px solid var(--verde);
}

/* Status banner */
.status-banner{
  padding:24px 20px;text-align:center;color:white;
  position:relative;
}
.status-banner.valid{background:linear-gradient(135deg,var(--verde-osc) 0%,var(--verde) 100%);}
.status-banner.expired{background:linear-gradient(135deg,var(--naranja-osc) 0%,var(--naranja) 100%);}
.status-banner.notfound{background:linear-gradient(135deg,var(--rojo-osc) 0%,var(--rojo) 100%);}
.status-banner.loading{background:linear-gradient(135deg,#1a1a1a 0%,#444 100%);}

.status-icon{
  width:72px;height:72px;border-radius:50%;
  background:white;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;font-size:42px;font-weight:800;
  font-family:'Barlow Condensed',sans-serif;
  box-shadow:0 4px 16px rgba(0,0,0,0.18);
}
.status-banner.valid .status-icon{color:var(--verde-osc);}
.status-banner.expired .status-icon{color:var(--naranja-osc);}
.status-banner.notfound .status-icon{color:var(--rojo-osc);}
.status-banner.loading .status-icon{color:var(--negro);animation:spin 1.4s linear infinite;}

@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.status-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px;font-weight:800;
  letter-spacing:4px;text-transform:uppercase;
  margin-bottom:4px;
}
.status-sub{font-size:12px;letter-spacing:2px;text-transform:uppercase;opacity:0.9;font-weight:600;}

/* Datos */
.cert-data{padding:0;}
.data-row{display:flex;align-items:stretch;border-bottom:1px solid #eee;}
.data-label{
  background:#f4f6f8;padding:10px 14px;
  font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--verde-osc);
  font-weight:700;flex:0 0 38%;
  display:flex;align-items:center;
  border-right:3px solid var(--verde);
}
.data-value{
  padding:10px 14px;font-size:13px;font-weight:600;
  color:var(--negro);flex:1;
  display:flex;align-items:center;word-break:break-word;
}

/* Foto */
.foto-section{padding:14px 18px 8px;background:#fafafa;border-bottom:1px solid #eee;}
.foto-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:3px;
  color:var(--verde-osc);font-weight:700;
  text-transform:uppercase;margin-bottom:6px;text-align:center;
}
.foto-wrapper{
  width:100%;
  border:2px solid var(--verde);
  background:white;overflow:hidden;
  position:relative;border-radius:3px;
}
.foto-wrapper img{width:100%;display:block;max-height:300px;object-fit:contain;}
.foto-badge{
  position:absolute;top:8px;left:8px;
  background:var(--verde-osc);color:white;
  padding:3px 9px;font-size:9px;
  letter-spacing:1.5px;font-weight:700;
  border-radius:1px;text-transform:uppercase;
}
.foto-missing{padding:18px;text-align:center;color:#999;font-size:11px;font-style:italic;}

/* Verificación manual */
.verify-section{
  padding:14px 18px;background:#fffdf0;
  border-top:2px solid var(--verde);border-bottom:1px solid #eee;
}
.verify-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;letter-spacing:2px;
  color:var(--verde-osc);font-weight:800;
  text-transform:uppercase;margin-bottom:6px;
}
.verify-list{
  margin:0;padding-left:18px;
  font-size:11.5px;line-height:1.55;color:#444;
}
.verify-list li{margin-bottom:3px;}

/* Footer */
.footer{
  background:var(--negro);color:white;
  padding:14px 18px;text-align:center;
}
.footer-brand{
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:800;letter-spacing:2px;
  text-transform:uppercase;color:var(--verde);
}
.footer-text{font-size:9.5px;letter-spacing:1.5px;color:rgba(255,255,255,0.6);margin-top:3px;text-transform:uppercase;}
.footer-contact{font-size:10px;color:rgba(255,255,255,0.85);margin-top:6px;}

.loading-msg{padding:30px 20px;text-align:center;color:#666;}

/* Error detail */
.error-detail{
  padding:18px;font-size:13px;color:#444;
  line-height:1.6;text-align:center;
  background:#fff8f8;border-bottom:1px solid #eee;
}
.error-detail strong{color:var(--rojo-osc);}
.error-detail ul{text-align:left;margin:10px auto;display:inline-block;font-size:12px;color:#555;line-height:1.7;padding-left:20px;}
.error-detail ul li{margin-bottom:4px;}
.error-detail ul li strong{color:var(--rojo-osc);}

.hash-row{
  padding:8px 14px;background:#f8f8f8;
  font-family:'Courier New',monospace;
  font-size:9px;color:#999;
  border-top:1px solid #eee;
  letter-spacing:0.5px;text-align:center;word-break:break-all;
}

@media (max-width:480px){
  .data-label{flex:0 0 42%;font-size:9.5px;padding:8px 10px;}
  .data-value{font-size:12px;padding:8px 10px;}
  .status-title{font-size:20px;letter-spacing:3px;}
  body{padding:12px 6px;}
  .brand-logo-img{height:50px;}
}
</style>
</head>

<div class="card" id="card">
  <div class="status-banner loading" id="statusBanner">
    <div class="status-icon" id="statusIcon">↻</div>
    <div class="status-title" id="statusTitle">Verificando...</div>
    <div class="status-sub" id="statusSub">Consultando base de datos</div>
  </div>

  <div id="contentArea">
    <div class="loading-msg">Validando autenticidad del certificado...</div>
  </div>
</div>

<script>
var CERTIFICADOS_JSON_URL = 'certificados.json';

function getParam(name){
  var m = location.search.match(new RegExp('[?&]' + name + '=([^&]+)'));
  return m ? decodeURIComponent(m[1]) : '';
}

function setStatus(estado, titulo, sub){
  var b = document.getElementById('statusBanner');
  b.className = 'status-banner ' + estado;
  document.getElementById('statusIcon').textContent =
    estado === 'valid' ? '✓' :
    estado === 'expired' ? '!' :
    estado === 'notfound' ? '✕' : '↻';
  document.getElementById('statusTitle').textContent = titulo;
  document.getElementById('statusSub').textContent = sub;
}

function escapeHtml(s){
  if(s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function formatearFecha(iso){
  if(!iso) return '—';
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var p = iso.split('-');
  if(p.length !== 3) return iso;
  return parseInt(p[2],10) + ' de ' + meses[parseInt(p[1],10)-1] + ' del ' + p[0];
}

function calcularDiasParaVencimiento(isoVenc){
  var hoy = new Date();
  var v = new Date(isoVenc + 'T00:00:00');
  return Math.ceil((v - hoy) / (1000*60*60*24));
}

function renderCertificado(cert){
  var contentArea = document.getElementById('contentArea');
  var diasFaltantes = calcularDiasParaVencimiento(cert.fecha_vencimiento);
  var vigente = diasFaltantes > 0;

  if(vigente){
    setStatus('valid', '✓ Certificado Válido', 'Documento auténtico emitido por Schneider Ingenieros');
  } else {
    setStatus('expired', '⚠ Certificado Vencido', 'Vencido hace ' + Math.abs(diasFaltantes) + ' día(s) — Requiere renovación');
  }

  var e = cert.equipo || {};
  var fotoHTML = cert.foto
    ? '<div class="foto-wrapper"><img src="' + cert.foto + '" alt="Equipo certificado"><div class="foto-badge">Foto del equipo</div></div>'
    : '<div class="foto-missing">⚠ Este certificado no incluye foto del equipo</div>';

  var colorVenc = vigente ? 'var(--verde-osc)' : 'var(--rojo-osc)';
  var textoVenc = vigente ? ' · ' + diasFaltantes + ' días' : ' · VENCIDO';

  var html =
    '<div class="foto-section">' +
      '<div class="foto-label">Evidencia visual del equipo</div>' +
      fotoHTML +
    '</div>' +
    '<div class="cert-data">' +
      '<div class="data-row"><div class="data-label">N° Certificado</div><div class="data-value" style="font-family:\'Barlow Condensed\',sans-serif;letter-spacing:1px;color:var(--verde-osc);">' + escapeHtml(cert.id) + '</div></div>' +
      '<div class="data-row"><div class="data-label">Tipo de Equipo</div><div class="data-value">' + escapeHtml(cert.tipo_equipo || 'Transformador de Aislamiento') + '</div></div>' +
      '<div class="data-row"><div class="data-label">Marca</div><div class="data-value">' + escapeHtml(e.marca || '—') + '</div></div>' +
      '<div class="data-row"><div class="data-label">Modelo</div><div class="data-value">' + escapeHtml(e.modelo || '—') + '</div></div>' +
      '<div class="data-row"><div class="data-label">N° de Serie</div><div class="data-value" style="font-family:\'Courier New\',monospace;">' + escapeHtml(e.serie || '—') + '</div></div>' +
      '<div class="data-row"><div class="data-label">Capacidad</div><div class="data-value">' + escapeHtml((e.capacidad_kva || 0) + ' KVA') + ' · ' + escapeHtml(e.fases || '—') + '</div></div>' +
      '<div class="data-row"><div class="data-label">Tensiones</div><div class="data-value">Prim: ' + escapeHtml(e.tension_primaria || '—') + 'V · Sec: ' + escapeHtml(e.tension_secundaria || '—') + 'V</div></div>' +
      '<div class="data-row"><div class="data-label">Corrientes</div><div class="data-value">Prim: ' + escapeHtml(e.corriente_primaria || '—') + 'A · Sec: ' + escapeHtml(e.corriente_secundaria || '—') + 'A</div></div>' +
      '<div class="data-row"><div class="data-label">Cliente</div><div class="data-value">' + escapeHtml(cert.cliente) + '</div></div>' +
      '<div class="data-row"><div class="data-label">Sede</div><div class="data-value">' + escapeHtml(cert.sede || '—') + '</div></div>' +
      '<div class="data-row"><div class="data-label">Ubicación</div><div class="data-value" style="font-size:11.5px;">' + escapeHtml(cert.ubicacion || '—') + '</div></div>' +
      '<div class="data-row"><div class="data-label">Fecha de Emisión</div><div class="data-value">' + formatearFecha(cert.fecha_emision) + '</div></div>' +
      '<div class="data-row"><div class="data-label">Vencimiento</div><div class="data-value" style="color:' + colorVenc + ';font-weight:700;">' + formatearFecha(cert.fecha_vencimiento) + textoVenc + '</div></div>' +
      '<div class="data-row"><div class="data-label">Responsable</div><div class="data-value" style="font-size:11.5px;">' + escapeHtml(cert.responsable || 'Ing. Alan Requejo Saldaña — CIP 385960') + '</div></div>' +
    '</div>' +
    '<div class="verify-section">' +
      '<div class="verify-title">⚠ Verificación manual</div>' +

        '<li>Confirma que la <strong>foto del equipo</strong> coincide con el equipo físico instalado.</li>' +
        '<li>Verifica que el <strong>N° de serie</strong> mostrado arriba coincida con la placa del equipo.</li>' +
        '<li>Comprueba que esta URL empieza con <code style="background:white;padding:1px 4px;border-radius:2px;font-size:11px;border:1px solid #ddd;">' + escapeHtml(location.host) + '</code></li>' +

}

      'El código <strong style="font-family:\'Courier New\',monospace;background:#fff0f0;padding:2px 6px;border-radius:2px;">' + escapeHtml(idBuscado || 'sin código') + '</strong>' +

function renderError(msg){
  setStatus('notfound', '✕ Error', 'No pudimos consultar la base oficial');
  document.getElementById('contentArea').innerHTML =
    '<div class="error-detail">' + escapeHtml(msg) + '<br><br>' +
    '<small>Si el problema persiste, contacta a <strong>arequejo@schneiderperu.com</strong></small></div>' +
    '<div class="footer"><div class="footer-brand">Schneider Ingenieros S.A.C.</div>' +
    '<div class="footer-text">Ingeniería · Eléctrica · Automatización</div></div>';
}

(async function init(){
  var id = getParam('id');
  if(!id){ renderNoEncontrado(''); return; }

  try {
    var resp = await fetch(CERTIFICADOS_JSON_URL + '?t=' + Date.now(), {cache:'no-store'});
    if(!resp.ok){ renderError('No se pudo consultar la base de datos (HTTP ' + resp.status + ')'); return; }
    var data = await resp.json();
    var certs = (data && Array.isArray(data.certificados)) ? data.certificados : [];
    var cert = certs.find(function(c){ return c.id === id; });
    if(!cert){ renderNoEncontrado(id); return; }
    renderCertificado(cert);
  } catch(err){
    console.error(err);
    renderError('Error técnico: ' + (err.message || 'desconocido'));
  }
})();
</script>
